version: "2"

run:
  timeout: 5m

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/openbootdotdev/openboot

linters:
  default: none
  enable:
    - errcheck
    - govet
    - staticcheck
    - ineffassign
    - unused
    - gocyclo
    - gosec
    - misspell
    - unconvert
    - exhaustive
  settings:
    exhaustive:
      default-signifies-exhaustive: true
    errcheck:
      exclude-functions:
        - (io.ReadCloser).Close
        - (io.Closer).Close
        - (net/http.ResponseWriter).Write
        - (*encoding/json.Encoder).Encode
        - os.WriteFile
        - (*os.File).Close
        - os.Remove
    gocyclo:
      min-complexity: 20
    gosec:
      excludes:
        - G304 # File path provided as taint input — acceptable for CLI tools
  exclusions:
    paths:
      - vendor
      - testutil
    rules:
      - path: "_test\\.go"
        linters:
          - errcheck
          - gosec

catalog:
  - changed-files:
      - any-glob-to-any-file:
          - internal/config/data/packages.yaml

brew:
  - changed-files:
      - any-glob-to-any-file:
          - internal/brew/**

installer:
  - changed-files:
      - any-glob-to-any-file:
          - internal/installer/**

ci:
  - changed-files:
      - any-glob-to-any-file:
          - .github/workflows/**

docs:
  - changed-files:
      - any-glob-to-any-file:
          - "*.md"
          - docs/**

tests:
  - changed-files:
      - any-glob-to-any-file:
          - "**/*_test.go"

snapshot:
  - changed-files:
      - any-glob-to-any-file:
          - internal/snapshot/**

ui:
  - changed-files:
      - any-glob-to-any-file:
          - internal/ui/**

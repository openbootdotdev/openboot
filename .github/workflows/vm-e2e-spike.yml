name: vm-e2e-spike

on:
  push:
    branches: ["test/vm-e2e-speed"]
  workflow_dispatch:

jobs:
  infra-probe:
    runs-on: macos-14
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binary
        run: make build

      - name: Run TestVM_Infra
        run: go test -v -timeout 5m -tags="e2e,vm" -run TestVM_Infra ./test/e2e/...

name: vm-e2e-spike

on:
  push:
    branches: ["test/vm-e2e-speed"]
  workflow_dispatch:

jobs:
  # Mirrors VM_A in make test-vm-parallel:
  # long-running journey tests that install packages and modify system state.
  group-a:
    runs-on: macos-14
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binary
        run: make build

      - name: Run group-a tests
        run: |
          go test -v -timeout 55m -tags="e2e,vm" \
            -run 'TestVM_Journey_FirstTimeUser|TestVM_Journey_DryRunIsCompletelySafe|TestVM_Interactive_InstallScript' \
            ./test/e2e/...

  # Mirrors VM_B in make test-vm-parallel:
  # dotfiles, macOS defaults, edge cases, sync, and non-destructive e2e.
  group-b:
    runs-on: macos-14
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binary
        run: make build

      - name: Run group-b tests
        run: |
          go test -v -timeout 55m -tags="e2e,vm" \
            -run 'TestVM_Journey_Dotfiles|TestVM_Journey_MacOS|TestVM_Journey_FullSetupConfiguresEverything|TestVM_Edge_|TestSmoke_|TestE2E_' \
            ./test/e2e/...

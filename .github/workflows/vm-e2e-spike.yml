name: vm-e2e-spike

on:
  push:
    branches: ["test/vm-e2e-speed"]
  workflow_dispatch:

jobs:
  l4:
    runs-on: macos-14
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binary
        run: make build

      - name: Run L4 vm tests
        run: |
          go test -v -timeout 55m -tags="e2e,vm" \
            -run 'TestVM_' \
            ./test/e2e/...
